---
name: Quality Checks

on:
  pull_request:
    paths:
      - 'src/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - 'next.config.ts'
      - 'eslint.config.mjs'
      - '.prettierrc.json'
      - 'postcss.config.mjs'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  quality-checks:
    name: Type Check, Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type Check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint:check

      - name: Format Check
        run: pnpm format:check

      - name: Build Check
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pnpm build

  quality-checks-summary:
    name: Quality Checks Summary
    needs: quality-checks
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.quality-checks.result }}" == "success" ]]; then
            echo "✅ All quality checks passed!"
            exit 0
          else
            echo "❌ Quality checks failed"
            exit 1
          fi
